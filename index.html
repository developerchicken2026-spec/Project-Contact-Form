<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Contact form</title>
  </head>
  <body>
    <form class="container">
      <div class="message-success">
        <div>
          <img src="./assets/images/icon-success-check.svg" alt="success" />
          <h3>Message Sent!</h3>
        </div>
        <h3>Thanks for completing the form. We'll be in touch soon!</h3>
      </div>
      <h1>Contact Us</h1>
      <div class="card-name">
        <div class="card-first-name">
          <label for="first-name">First Name <span>*</span></label>
          <input type="text" id="first-name" name="first-name" required />
          <p>This field is required</p>
        </div>
        <div class="card-last-name">
          <label for="last-name">Last Name <span>*</span></label>
          <input type="text" id="last-name" name="last-name" required />
          <p>This field is required</p>
        </div>
      </div>
      <label for="email">Email Address<span> *</span></label>
      <input type="email" id="email" name="email" required />
      <p>Please enter a valid email address</p>
      <h2>Query Type <span>*</span></h2>
      <div class="card-radio">
        <div class="card-radio-left">
          <input type="radio" id="radio-left" name="radio" required />
          <label for="radio-left">General Enquiry</label>
        </div>
        <div class="card-radio-right">
          <input type="radio" id="radio-right" name="radio" required />
          <label for="radio-right">Support Request</label>
        </div>
      </div>
      <p class="p-radio">Please select a query type</p>
      <h2 class="text-message">Message <span>*</span></h2>
      <textarea type="text" id="message" name="message"></textarea>
      <p class="p-message">This field is required</p>
      <div class="card-checkbox">
        <input type="checkbox" id="checkbox" name="checkbox" required />
        <label for="checkbox"
          >I consent to being contacted by the team <span>*</span></label
        >
      </div>
      <p>To submit this form, please consent to being contacted</p>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
